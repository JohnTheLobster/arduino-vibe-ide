# Arduino Vibe IDE — Configuration
# Generated by Arduino Vibe IDE Setup Wizard

# Arduino CLI settings
arduino_cli: /home/john/bin/arduino-cli
arduino_data_dir: ~/.arduino15

# Project storage
projects_dir: ~/projects/arduino-vibe-ide/projects

# Default hardware configuration
hardware:
  board: arduino:avr:nano
  board_name: "Arduino Nano (clone)"
  connection_type: usb  # usb | bluetooth

  # USB serial
  usb_port: ""  # Auto-detected (e.g., /dev/ttyACM0)

  # Bluetooth HC-05
  bluetooth:
    mac: "98:DA:50:01:E2:CF"
    pin: "1234"
    rfcomm_channel: 1
    wiring:
      rxd_pin: 11  # HC-05 RXD -> Arduino D11
      txd_pin: 10  # HC-05 TXD -> Arduino D10

  # LEDs (FastLED)
  leds:
    data_pin: 6
    num_leds: 288
    led_type: SK6812
    color_order: GRBW
    default_brightness: 128

  # Serial
  serial:
    baudrate: 115200

# Default libraries
libraries:
  - FastLED
  - SoftwareSerial
